name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Permite ejecutar el build manualmente desde la web de GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest # ¡La magia! GitHub nos presta un servidor Windows gratis

    steps:
      - name: Descargar codigo fuente
        uses: actions/checkout@v4

      - name: Instalar Node.js (Para el Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Usa una versión estable de Node

      - name: Compilar Frontend (React)
        run: |
          npm install
          npm run build

      - name: Instalar Python (Para el Backend)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Versión estable de Python

      - name: Instalar dependencias del Backend
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Empaquetar EXE con PyInstaller
        run: |
          cd backend
          pyinstaller --noconfirm Sistema_POS.spec
          cd ..

      - name: Preparar Carpeta de Distribucion
        run: |
          mkdir Sistema_POS_Final
          copy backend\dist\Sistema_POS.exe Sistema_POS_Final\
          
          # No incluimos autoparts.db para que el sistema lo cree desde cero al abrirse
          # y no sobreescribir datos si el usuario lo descarga como actualizacion.
          # Tampoco uploads ni backups porque se autogeneraran.

      - name: Comprimir Carpeta (ZIP)
        run: Compress-Archive -Path Sistema_POS_Final\* -DestinationPath Sistema_POS_Windows.zip

      - name: Crear Release Publico (Descarga Libre)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Última Versión del Sistema
          files: Sistema_POS_Windows.zip
          draft: false
          prerelease: false
          make_latest: true
